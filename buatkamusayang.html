<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunga Cantik Buat Kamu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #fee1e8, #fbc2eb);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .flower-container {
            text-align: center;
            position: relative;
        }

        h1 {
            color: #d63384;
            font-size: 24px;
            margin-bottom: 50px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Struktur Bunga */
        .flower {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
            animation: spin 20s infinite linear;
        }

        .petal {
            position: absolute;
            background: #ff758c;
            border-radius: 50% 50% 0 50%;
            width: 50px;
            height: 50px;
            top: 0;
            left: 50px;
            transform-origin: 0% 100%;
            opacity: 0.9;
            box-shadow: 0 0 10px rgba(255, 117, 140, 0.5);
        }

        /* Mengatur posisi kelopak bunga */
        .p1 { transform: rotate(0deg); background: #ff758c; }
        .p2 { transform: rotate(45deg); background: #ff7ebb; }
        .p3 { transform: rotate(90deg); background: #ff758c; }
        .p4 { transform: rotate(135deg); background: #ff7ebb; }
        .p5 { transform: rotate(180deg); background: #ff758c; }
        .p6 { transform: rotate(225deg); background: #ff7ebb; }
        .p7 { transform: rotate(270deg); background: #ff758c; }
        .p8 { transform: rotate(315deg); background: #ff7ebb; }

        .center {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #fae896;
            border-radius: 50%;
            top: 30px;
            left: 30px;
            z-index: 10;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .stem {
            width: 8px;
            height: 150px;
            background: #71b340;
            margin: -10px auto 0;
            border-radius: 4px;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="flower-container">
        <h1>Bunganya udah jadi, tinggal dipandang aja! 🌸</h1>
        <div class="flower">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="petal p7"></div>
            <div class="petal p8"></div>
            <div class="center"></div>
        </div>
        <div class="stem"></div>
    </div>

</body>
</html>
